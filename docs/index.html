<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>48apps</title>
<meta name="description" content="48apps — apps that help. Starting with LiDTrainer: the German citizenship test in 100+ languages.">
<!-- Заглушка-главная студии. Пока один продукт — позже заменить на полноценную витрину. -->
<meta name="robots" content="noindex">
<style>
  :root { --bg:#F5F5F5; --surface:#FFFFFF; --text:#1B1B1B; --muted:#5F5F5F; --maroon:#6D3B3B; --border:#E0E0E0; }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center;
         font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:var(--bg); color:var(--text); padding:24px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:18px;
          max-width:440px; width:100%; padding:40px 32px; text-align:center;
          box-shadow:0 8px 30px rgba(0,0,0,.05); }
  .brand { font-size:32px; font-weight:800; letter-spacing:-.5px; color:var(--maroon); margin:0 0 6px; }
  .tag { color:var(--muted); margin:0 0 28px; font-size:15px; }
  .app { display:block; text-decoration:none; color:inherit; border:1px solid var(--border);
         border-radius:14px; padding:16px 18px; text-align:left; transition:border-color .15s, transform .15s; }
  .app:hover { border-color:var(--maroon); transform:translateY(-1px); }
  .app h2 { margin:0 0 4px; font-size:17px; }
  .app p { margin:0; color:var(--muted); font-size:14px; }
  .arrow { float:right; color:var(--maroon); font-weight:700; }
  footer { margin-top:24px; font-size:12px; color:var(--muted); }
</style>
</head>
<body>
  <main class="card">
    <p class="brand">48apps</p>
    <p class="tag">Apps that help · Apps, die helfen</p>
    <a class="app" href="/lidtrainer/">
      <span class="arrow">→</span>
      <h2>LiDTrainer</h2>
      <p>«Leben in Deutschland» / Einbürgerungstest — 310 questions in 100+ languages.</p>
    </a>
    <footer>© 2026 48apps</footer>
  </main>
</body>
</html>
